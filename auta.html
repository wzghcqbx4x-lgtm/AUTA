<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Správce mých aut</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      padding: 24px 16px;
      color: #222;
    }
    header { max-width: 860px; margin: 0 auto 24px; }
    header h1 { font-size: 26px; font-weight: 700; color: #1a1a2e; }
    header p { font-size: 13px; color: #888; margin-top: 4px; }
    #souhrn { max-width: 860px; margin: 0 auto 20px; }
    .souhrn-box {
      background: #fff8e1;
      border-left: 4px solid #ffa000;
      border-radius: 10px;
      padding: 14px 18px;
    }
    .souhrn-box strong { font-size: 14px; color: #e65100; }
    .souhrn-box ul { margin: 8px 0 0 16px; font-size: 14px; color: #555; line-height: 1.8; }
    .grid {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 16px;
    }
    .auto { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .auto-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .auto-ikona { font-size: 28px; }
    .auto-nazev { font-size: 16px; font-weight: 600; color: #1a1a2e; }
    .auto-spz { font-size: 12px; color: #999; margin-top: 2px; }
    .auto-majitel { font-size: 12px; color: #666; margin-top: 3px; }
    .termin {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 14px;
    }
    .termin:last-child { border-bottom: none; }
    .termin-nazev { color: #555; }
    .termin-info { text-align: right; }
    .termin-datum {
      font-weight: 600;
      cursor: pointer;
      border-bottom: 1px dashed #ccc;
      display: inline-block;
    }
    .termin-datum:hover { border-bottom-color: #1a1a2e; }
    .termin-dnu { font-size: 11px; color: #aaa; margin-top: 2px; }
    .ok .termin-datum { color: #2e7d32; }
    .brzy .termin-datum { color: #e65100; }
    .preskoceno .termin-datum { color: #c62828; }
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      margin-left: 6px;
    }
    .badge-brzy { background: #fff3e0; color: #e65100; }
    .badge-preskoceno { background: #ffebee; color: #c62828; }
    .aktualizace {
      max-width: 860px;
      margin: 20px auto 0;
      text-align: right;
      font-size: 12px;
      color: #bbb;
    }
    .edit-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .edit-box {
      background: white;
      border-radius: 14px;
      padding: 24px;
      width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .edit-box h3 { font-size: 16px; margin-bottom: 16px; color: #1a1a2e; }
    .edit-box input[type="date"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 16px;
    }
    .edit-btns { display: flex; gap: 8px; }
    .edit-btns button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-ulozit { background: #1a1a2e; color: white; }
    .btn-zrusit { background: #f0f0f0; color: #555; }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🚗 Správce mých aut</h1>
  <p>Přehled termínů pro všechna vozidla — klikni na datum pro úpravu</p>
</header>

<div id="souhrn"></div>

<div class="grid">
  <div id="superb" class="auto"></div>
  <div id="karoq" class="auto"></div>
  <div id="ceed" class="auto"></div>
  <div id="rio" class="auto"></div>
</div>

<div class="aktualizace" id="aktualizace"></div>
<div style="max-width:860px;margin:12px auto;text-align:right;">
  <button onclick="poslatEmail()" style="background:#1a1a2e;color:white;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;">📧 Poslat přehled emailem</button>
</div>

<script>
  const dnes = new Date();

  document.getElementById("aktualizace").textContent =
    "Aktualizováno: " + dnes.toLocaleDateString("cs-CZ");

  const data = {
    superb:  { nazev: "Škoda Superb 3 Sportline", ikona: "🚙", spz: "6SN 4035", majitel: "Petr Havlovic ml.", terminy: { "STK": "2026-06-03", "Pojištění": "2026-12-31", "Dálniční známka": "2026-12-12" }},
    karoq:   { nazev: "Škoda Karoq", ikona: "🚗", spz: "1TR 1366", majitel: "Petr Havlovic st.", terminy: { "STK": "2027-04-23", "Pojištění": "2026-06-19", "Dálniční známka": "2027-01-29" }},
    ceed:    { nazev: "Kia Ceed", ikona: "🚘", spz: "5U0 3868", majitel: "Michaela Hlínová/Havlovicová", terminy: { "STK": "2026-05-17", "Pojištění": "2027-02-14" }},
    rio:     { nazev: "Kia Rio", ikona: "🚖", spz: "6SX 4095", majitel: "Iveta Havlovicová", terminy: { "STK": "2026-11-11", "Pojištění": "2027-04-17" }}
  };

  function zbarvi(datum) {
    const diff = Math.ceil((new Date(datum) - dnes) / (1000 * 60 * 60 * 24));
    if (diff < 0) return { cls: "preskoceno", text: "prošlé!", diff };
    if (diff <= 60) return { cls: "brzy", text: "za " + diff + " dní", diff };
    return { cls: "ok", text: "za " + diff + " dní", diff };
  }

  function formatDatum(datum) {
    return new Date(datum).toLocaleDateString("cs-CZ");
  }

  function renderAuto(id) {
    const auto = data[id];
    const el = document.getElementById(id);
    let html = `
      <div class="auto-header">
        <div class="auto-ikona">${auto.ikona}</div>
        <div>
          <div class="auto-nazev">${auto.nazev}</div>
          <div class="auto-spz">${auto.spz}</div>
          <div class="auto-majitel">👤 ${auto.majitel}</div>
        </div>
      </div>`;
    for (const nazevTerminu in auto.terminy) {
      const datum = auto.terminy[nazevTerminu];
      const info = zbarvi(datum);
      const badge = info.cls === "brzy"
        ? '<span class="badge badge-brzy">!</span>'
        : info.cls === "preskoceno"
        ? '<span class="badge badge-preskoceno">!!</span>'
        : "";
      html += `
        <div class="termin ${info.cls}">
          <span class="termin-nazev">${nazevTerminu}${badge}</span>
          <div class="termin-info">
            <div class="termin-datum" onclick="upravitDatum('${id}','${nazevTerminu}')">${formatDatum(datum)}</div>
            <div class="termin-dnu">${info.text}</div>
          </div>
        </div>`;
    }
    el.innerHTML = html;
  }

  function renderVse() {
    for (const id in data) renderAuto(id);
    renderSouhrn();
  }

  function upravitDatum(autoId, terminNazev) {
    const aktualniDatum = data[autoId].terminy[terminNazev];
    const overlay = document.createElement("div");
    overlay.className = "edit-overlay";
    overlay.innerHTML = `
      <div class="edit-box">
        <h3>Upravit: ${terminNazev}<br><small style="font-weight:400;color:#999;">${data[autoId].nazev}</small></h3>
        <input type="date" id="edit-input" value="${aktualniDatum}">
        <div class="edit-btns">
          <button class="btn-zrusit" onclick="this.closest('.edit-overlay').remove()">Zrušit</button>
          <button class="btn-ulozit" onclick="ulozitDatum('${autoId}','${terminNazev}')">Uložit</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
  }

  function ulozitDatum(autoId, terminNazev) {
    const noveDatum = document.getElementById("edit-input").value;
    if (noveDatum) {
      data[autoId].terminy[terminNazev] = noveDatum;
      document.querySelector(".edit-overlay").remove();
      renderVse();
    }
  }

  function renderSouhrn() {
    const brzy = [];
    for (const id in data) {
      const auto = data[id];
      for (const nazev in auto.terminy) {
        const info = zbarvi(auto.terminy[nazev]);
        if (info.cls !== "ok") {
          brzy.push({ text: auto.nazev + " — " + nazev, diff: info.diff });
        }
      }
    }
    brzy.sort(function(a, b) { return a.diff - b.diff; });
    if (brzy.length > 0) {
      document.getElementById("souhrn").innerHTML =
        '<div class="souhrn-box"><strong>⚠️ Vyřiď nejdřív:</strong><ul>' +
        brzy.map(function(b) {
          return "<li>" + b.text + " <strong>(" + (b.diff < 0 ? "prošlé!" : "za " + b.diff + " dní") + ")</strong></li>";
        }).join("") + "</ul></div>";
    }
  }

  function poslatEmail() {
    const radky = [];
    for (const id in data) {
      const auto = data[id];
      for (const nazev in auto.terminy) {
        const info = zbarvi(auto.terminy[nazev]);
        const stav = info.cls === "preskoceno" ? "❌ PROŠLÉ" : info.cls === "brzy" ? "⚠️ BRZY" : "✅";
        radky.push(stav + " " + auto.nazev + " — " + nazev + " (" + info.text + ")");
      }
    }
    const predmet = encodeURIComponent("🚗 Správce aut — přehled termínů");
    const telo = encodeURIComponent(
      "Přehled termínů aut ke dni " + dnes.toLocaleDateString("cs-CZ") + ":\n\n" +
      radky.join("\n") +
      "\n\nOdkaz: https://wzghcqbx4x-lgtm.github.io/AUTA/auta.html"
    );
    window.location.href = "mailto:?subject=" + predmet + "&body=" + telo;
  }

  renderVse();
</script>

</body>
</html>
